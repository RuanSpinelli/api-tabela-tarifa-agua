  services:

    postgres:
      image: postgres:17
      container_name: tarifa-postgres

      restart: unless-stopped

      environment:
        POSTGRES_DB: tarifa_agua_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres

      ports:
        - "5432:5432"

      volumes:
        - postgres_data:/var/lib/postgresql/data

      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d tarifa_agua_db"]
        interval: 10s
        timeout: 5s
        retries: 5

    adminer:
      image: adminer:latest
      container_name: tarifa-adminer

      restart: unless-stopped

      depends_on:
        postgres:
          condition: service_healthy

      ports:
        - "8081:8080"

  volumes:
    postgres_data: